<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="style.css" rel="stylesheet" />
    <title>Document</title>
  </head>
  <body>
    <div>
      <form>
        <fieldset class="personal">
          <legend>Ваши личные данные</legend>
          <label for="first-name">Ваше имя</label>
          <input type="text" id="first-name" required placeholder="Имя" />
          <label for="age">Ваш возраст</label>
          <input
            type="number"
            min="18"
            max="100"
            step="1"
            id="age"
            required
            placeholder="Возраст"
          />
          <label for="phone">Ваш номер телефона</label>
          <input type="tel" id="phone" required placeholder="Номер телефона" />
          <label for="email"> Ваша почта</label>
          <input type="email" id="email" required placeholder="Почта" />
        </fieldset>
        <label for="message">Сообщение</label>
        <textarea id="message" required placeholder="Ваше сообщение"></textarea>
        <fieldset>
          <input
            class="input-rules"
            type="checkbox"
            name=""
            id="rules"
            required
          />
          <label class="label-rules" for="rules">Я принимаю правила </label>
          <button type="submit">Отправить</button>
        </fieldset>
      </form>
    </div>
  </body>
</html>
